services:
  postgres:
    image: postgres:16-alpine
    container_name: brighttrade-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brighttrade

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - brighttrade-network

  backend:
    build:
      context: ./backend

    container_name: brighttrade-backend

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brighttrade?schema=public
      JWT_SECRET: dev-secret-key-for-development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: brighttrade

    networks:
      - brighttrade-network

  frontend:
    build:
      context: ./frontend

    container_name: brighttrade-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      VITE_API_URL: http://localhost:5000/api

    networks:
      - brighttrade-network

volumes:
  postgres_data:

networks:
  brighttrade-network:
    driver: bridge